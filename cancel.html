<!DOCTYPE html>
<html>
<head>
  <title>Payment Cancelled</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f9fafb;
      color: #111827;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 32rem;
      background-color: white;
      border-radius: 0.5rem;
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
    }
    h1 {
      color: #dc2626;
      margin-bottom: 0.5rem;
    }
    p {
      color: #4b5563;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }
    .close-button {
      background-color: #6b7280;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.375rem;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
      font-size: 1rem;
    }
    .close-button:hover {
      background-color: #4b5563;
    }
    .note {
      margin-top: 1rem;
      font-size: 0.875rem;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Payment Cancelled</h1>
    <p>Your credit purchase was not completed. No charges were made. You can try again anytime from the Credits tab in the extension.</p>
    <button class="close-button" id="closeButton">Close Window</button>
    <p class="note">You can close this tab and return to the Patent Search Generator extension.</p>
  </div>
  <script>
    document.getElementById('closeButton').addEventListener('click', function() {
      try {
        window.close();
      } catch (e) {
        // Can't close — no-op, user can close manually
      }
    });
  </script>
</body>
</html>
